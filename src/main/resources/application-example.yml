# 复制为 application-local.yml（勿提交密钥）或注入环境变量后使用。
# 脱敏示例：仅展示形态；真实 token 仅存 hash，见 eval-upgrade.md E1/E3。

server:
  port: 8099

eval:
  # 与被测 vagent.eval.api 等配置的明文 token 一致；勿写入仓库，用环境变量注入
  default-eval-token: ""
  # 可选：travel-ai 等要求 X-Eval-Gateway-Key 时注入，须与其 app.eval.gateway-key 一致
  default-eval-gateway-key: ""
  membership:
    salt: "<CONFIGURE_VIA_ENV_NOT_PLAINTEXT_IN_REPO>"
    top-n: 8
  api:
    allow-cidrs:
      - 127.0.0.1/32
    enabled: true
    token-hash: "<HMAC_OR_BCRYPT_OF_TOKEN>"
    require-https: true
  targets:
    - target-id: vagent
      base-url: https://vagent.internal.example
      eval-token: ""
      enabled: true
      # compare 的 *_meta_trace 及本地探针可注入的 meta 键；按被测方 schema 各自维护
      meta-trace-keys:
        - hybrid_lexical_mode
        - hybrid_lexical_outcome
        - retrieve_hit_count
        - retrieve_top1_distance
        - retrieve_top1_distance_bucket
    - target-id: travel-ai
      base-url: https://travel-ai.internal.example
      eval-token: ""
      eval-gateway-key: ""
      enabled: false
      meta-trace-keys: []

  # 上游 meta 快照（eval_result.target_meta_json）；与 eval.runner.chat-mode 配合控制明文 hit id
  persistence:
    allow-plain-retrieval-hit-ids-in-meta: false
    max-target-meta-json-chars: 262144

  # =========================
  # 数据保留期 / 删除策略（P1）
  # =========================
  #
  # 1) 手动删除（按 run_id）：DELETE /api/v1/eval/runs/{runId}
  #    - 这是“立即删除”，用于合规/删除权或误跑清理
  #    - 该管理 API 受 eval.api.* 安全链保护（enabled/CIDR/token-hash 等）
  #
  # 2) 自动清理（retention janitor）：定时删除“已结束且过期”的 run
  #    - 默认关闭，避免本地开发误删证据；生产/CI 若需要控制 DB 体量可开启
  #    - 仅删除 FINISHED/CANCELLED 且 finished_at < now - days 的 run（results 会级联删除）
  retention:
    enabled: false
    days: 14
    # 24h 扫一次（毫秒）。生产可按体量调小，但别过于频繁导致 DB 压力增大。
    interval-ms: 86400000

  # =========================
  # 阶段五：Redis（5.1 连通性 + 5.2 跨实例 run 队列）
  # =========================
  #
  # 连接参数用 Spring Boot 标准 spring.data.redis.*（或 SPRING_DATA_REDIS_* 环境变量）。
  # eval.scheduler.redis：enabled、key 前缀、连接失败策略、BLPOP 超时等。
  scheduler:
    redis:
      enabled: false
      key-prefix: "vagent:eval:"
      on-connect-failure: lenient
      # 5.2：BLPOP 阻塞超时（秒）
      br-pop-timeout-seconds: 5
      # 5.3：全集群同一 target 最多同时跑几个 run（需 Redis 调度队列）；0=不限制
      global-max-concurrent-runs-per-target: 0
      # 5.3：拿到 run 后等全局配额的最长时间（毫秒）
      global-quota-acquire-timeout-ms: 30000

# 与 eval.scheduler.redis 配套示例（启用时请取消注释并改为真实地址/凭据）
# spring:
#   data:
#     redis:
#       host: redis.internal.example
#       port: 6379
#       username: ""
#       password: "<CONFIGURE_VIA_ENV_NOT_PLAINTEXT_IN_REPO>"
