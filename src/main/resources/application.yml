server:
  port: 8099

spring:
  application:
    name: vagent-eval
  jackson:
    property-naming-strategy: SNAKE_CASE

# 对外 JSON / API 字段以 snake_case 为准；此处为服务配置，使用 kebab-case 与 SSOT 对齐。
eval:
  # Day6：引用 membership（盐与候选前 N）；生产勿提交真实盐明文
  membership:
    salt: "p0-local-dev"
    top-n: 8
  # 仅本地验收 Day4 契约时可设为 true，会注册 /api/v1/eval/chat 探针（默认 false）
  probe:
    enabled: true
  api:
    enabled: false
    token-hash: ""
    # Day9：非空则仅允许所列 CIDR 访问管理 API；空则不做 IP 限制
    allow-cidrs: []
    require-https: false
  targets:
    - target-id: vagent
      base-url: http://localhost:8080
      enabled: true
    - target-id: travel-ai
      base-url: http://localhost:8081
      enabled: true
    - target-id: probe
      base-url: http://localhost:8099
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
